<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>




        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">

        <style>      
        
    

        /* =================================================================================== */


        .my-element {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            transition: transform 0.5s ease; /* Плавный переход для transform */
        }

        .shifted {
            transform: translateX(200px); /* Сдвиг вправо на 200px */}
        
        </style>

    </head>

    <body>

        <!-- ----------------------------------------------------------------------------------------------------- -->

        <div class="my-element" id="myElement"></div>
        <button id="myButton">Сдвинуть элемент</button>


        <!-- ----------------------------------------------------------------------------------------------------- -->

        <script src="script.js">

            // Получаем ссылки на наши HTML-элементы
            const myElement = document.getElementById('myElement');
            const myButton = document.getElementById('myButton');

            // Добавляем обработчик события "click" к кнопке
            myButton.addEventListener('click', function() {
            // Переключаем класс 'shifted' у элемента
            // Если класс уже есть, он будет удален, если нет - добавлен
            myElement.classList.toggle('shifted');
            });
            
        </script>
        
        
        


    </body>

</html>
