<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>




    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">

    <style>
        .container {
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            border: 2px solid #333;
            margin: 20px auto;
        }
        .moving-element {
            display: flex;
            transition: transform 0.3s ease;
        }
        .slide {
            flex: 0 0 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
        .slide1 { background: lightgreen; }
        .slide2 { background: lightblue; }
        .slide3 { background: lightcoral; }
        .buttons { text-align: center; }
        button { margin: 5px; padding: 8px 16px; }
    </style>

</head>

<body>

    <!-- ----------------------------------------------------------------------------------------------------- -->

    <div class="container">
        <div class="moving-element">
            <div class="slide slide1">1</div>
            <div class="slide slide2">2</div>
            <div class="slide slide3">3</div>
        </div>
    </div>
    <div class="buttons">
        <button id="moveLeftBtn">◀ Назад</button>
        <button id="moveRightBtn">Вперёд ▶</button>
    </div>

    <script>
        const moveRightBtn = document.getElementById('moveRightBtn');
        const moveLeftBtn = document.getElementById('moveLeftBtn');
        const movingElement = document.querySelector('.moving-element');
        const positions = ['translateX(0)', 'translateX(-100%)', 'translateX(-200%)'];
        let currentIndex = 0;

        function applyPosition() {
            movingElement.style.transform = positions[currentIndex];
        }

        moveRightBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % positions.length;
            applyPosition();
        });

        moveLeftBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + positions.length) % positions.length;
            applyPosition();
        });
    </script>

    <!-- ----------------------------------------------------------------------------------------------------- -->







</body>

</html>
