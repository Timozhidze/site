<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>




        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">

        <style>      
        
    

        /* =================================================================================== */


            .container {
                width: 150px;
                height: 200px;
                border: 2px solid black;
                overflow: hidden;   /* скрывает всё, что выходит за границы */
                position: relative; /* можно не ставить, но для ясности */
            }

            .moving-element {
                width: 100px;
                height: 100px;
                background-color: coral;
                transition: transform 0.3s ease;
            }

            /* Классы для смещения */
            .translate-0 {
                transform: translateX(0);
            }
            .translate-1 {
                transform: translateX(40px);
            }
            .translate-2 {
                transform: translateX(80px);
            }
        



        </style>

    </head>

    <body>

        <!-- ----------------------------------------------------------------------------------------------------- -->

        <div class="container">
            <div class="moving-element"></div>
        </div>
        <button id="moveBtn">Сдвинуть</button>

        <!-- ----------------------------------------------------------------------------------------------------- -->

        <script>

            const button = document.getElementById('moveBtn');
            const movingElement = document.querySelector('.moving-element');

            const translateClasses = ['translate-0', 'translate-1', 'translate-2'];
            let step = 0;

            button.addEventListener('click', () => {
                step = (step + 1) % translateClasses.length;
                translateClasses.forEach(cls => movingElement.classList.remove(cls));
                movingElement.classList.add(translateClasses[step]);
            });
            
        </script>
        
        
        


    </body>

</html>
