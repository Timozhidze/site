<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>




        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">

        <style>      
        
            #one {
                width: 1000px; height: 1000px; border: 1px solid black; display: grid; grid-template-columns: repeat(2, 1fr);
            }

            @media (max-width: 740px) {
                #one {
                grid-template-columns: 1fr;
            }
            }
        </style>

    </head>

    <body>

        <!-- ----------------------------------------------------------------------------------------------------- -->

        <div id="one">
            <div style="border: 1px solid black;">fffff</div>
            <div style="border: 1px solid black;">aaaaa</div>
            <div style="border: 1px solid black;">bbbbb</div>
            <div style="border: 1px solid black;">eeeee</div>
        </div>

        <!-- ----------------------------------------------------------------------------------------------------- -->

    </body>

</html>
